<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 680" role="img" aria-label="TSV Untergruppenbach 1905">
  <defs>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="45%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#8c8c8c"/>
    </linearGradient>
    <!-- Pfad für den unteren Schriftbogen UNTERGRUPPENBACH -->
    <path id="arcBottom" d="M 88 410 Q 160 612 300 652 Q 440 612 512 410" fill="none"/>
    <!-- innerer Schild (Clip + Outline) -->
    <path id="innerShield" d="M 118 110 H 482 V 340 Q 482 490 300 600 Q 118 490 118 340 Z"/>
    <clipPath id="innerClip"><use href="#innerShield"/></clipPath>
  </defs>

  <!-- Äußerer Silberrahmen -->
  <path d="M 55 55 H 545 V 350 Q 545 528 300 665 Q 55 528 55 350 Z"
        fill="url(#silver)" stroke="#6b6b6b" stroke-width="3"/>

  <!-- Innerer Schild — weiß -->
  <use href="#innerShield" fill="#ffffff"/>

  <!-- Obere linke Hälfte rot (diagonal geteilt) -->
  <polygon points="118,110 482,110 118,600" fill="#d7282a" clip-path="url(#innerClip)"/>

  <!-- Schwarze Diagonale -->
  <line x1="482" y1="110" x2="118" y2="600" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Outline des inneren Schildes -->
  <use href="#innerShield" fill="none" stroke="#000" stroke-width="3.5"/>

  <!-- Zwei rote Sterne -->
  <g fill="#d7282a">
    <polygon transform="translate(150 82) scale(1.7)"
             points="0,-10 2.94,-3.09 9.51,-3.09 4.29,1.18 6.47,7.81 0,3.82 -6.47,7.81 -4.29,1.18 -9.51,-3.09 -2.94,-3.09"/>
    <polygon transform="translate(450 82) scale(1.7)"
             points="0,-10 2.94,-3.09 9.51,-3.09 4.29,1.18 6.47,7.81 0,3.82 -6.47,7.81 -4.29,1.18 -9.51,-3.09 -2.94,-3.09"/>
  </g>

  <!-- 1905 -->
  <text x="300" y="92" text-anchor="middle"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="26" font-weight="700" letter-spacing="10" fill="#111">1905</text>

  <!-- UNTERGRUPPENBACH auf Bogen -->
  <text font-family="'Arial Black', Impact, Arial, sans-serif"
        font-size="34" font-weight="900" letter-spacing="2" fill="#111">
    <textPath href="#arcBottom" startOffset="3%">UNTERGRUPPENBACH</textPath>
  </text>

  <!-- TSV Buchstaben mit dicker schwarzer Kontur -->
  <g font-family="Georgia, 'Times New Roman', serif"
     font-weight="900" font-size="190"
     stroke="#000" stroke-width="8" stroke-linejoin="round"
     paint-order="stroke">
    <text x="132" y="270" fill="#ffffff">T</text>
    <text x="258" y="410" fill="#d7282a">S</text>
    <text x="370" y="270" fill="#ffffff">V</text>
  </g>
</svg>
