<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Hintergrund transparent -->
  <!-- Burg-Silhouette oben (Burg Stettenfels, stilisiert) -->
  <g transform="translate(0,2)">
    <!-- Bergrücken -->
    <path d="M 10,70 Q 60,40 100,35 Q 140,40 190,70 L 190,92 L 10,92 Z" fill="#ffffff" stroke="#6b7280" stroke-width="0.5"/>
    <!-- Hauptturm (Mitte) -->
    <rect x="86" y="22" width="18" height="50" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <!-- Zinnen Hauptturm -->
    <rect x="86" y="22" width="4" height="5" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="93" y="22" width="4" height="5" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="100" y="22" width="4" height="5" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <!-- Fähnchen -->
    <line x1="95" y1="22" x2="95" y2="10" stroke="#6b7280" stroke-width="0.8"/>
    <path d="M 95,10 L 103,13 L 95,16 Z" fill="#b91c1c"/>
    <!-- Seitenturm links -->
    <rect x="65" y="38" width="14" height="34" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="65" y="38" width="3" height="4" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="70" y="38" width="3" height="4" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="76" y="38" width="3" height="4" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <!-- Seitenturm rechts -->
    <rect x="111" y="42" width="14" height="30" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="111" y="42" width="3" height="4" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="116" y="42" width="3" height="4" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="122" y="42" width="3" height="4" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <!-- Mauer mit Zinnen links -->
    <rect x="30" y="55" width="30" height="17" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="30" y="55" width="3" height="3" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="36" y="55" width="3" height="3" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="42" y="55" width="3" height="3" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="48" y="55" width="3" height="3" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="54" y="55" width="3" height="3" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <!-- Mauer mit Zinnen rechts -->
    <rect x="130" y="58" width="30" height="14" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="130" y="58" width="3" height="3" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="136" y="58" width="3" height="3" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="142" y="58" width="3" height="3" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="148" y="58" width="3" height="3" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
    <rect x="154" y="58" width="3" height="3" fill="#ffffff" stroke="#6b7280" stroke-width="0.8"/>
  </g>

  <!-- Rotes Wappen / Schild -->
  <path d="M 30,95 L 170,95 L 170,150 Q 170,185 100,210 Q 30,185 30,150 Z"
        fill="#b91c1c" stroke="#1f2937" stroke-width="2.5"/>
  <!-- Innere weiße Linie als Wappen-Rahmen -->
  <path d="M 36,100 L 164,100 L 164,149 Q 164,181 100,203 Q 36,181 36,149 Z"
        fill="none" stroke="#ffffff" stroke-width="1.2"/>

  <!-- 1905 oben mit Sternchen -->
  <g font-family="Georgia, serif" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <text x="78" y="115" font-size="11">★</text>
    <text x="100" y="116" font-size="13" letter-spacing="1.5">1905</text>
    <text x="122" y="115" font-size="11">★</text>
  </g>

  <!-- Großes TSV in der Mitte -->
  <text x="100" y="160" font-family="Georgia, serif" font-weight="900"
        font-size="42" fill="#ffffff" text-anchor="middle" letter-spacing="-1">TSV</text>

  <!-- UNTERGRUPPENBACH gebogen unten -->
  <defs>
    <path id="curve" d="M 45,175 Q 100,210 155,175"/>
  </defs>
  <text font-family="Georgia, serif" font-weight="bold" font-size="10.5" fill="#ffffff" letter-spacing="1">
    <textPath href="#curve" startOffset="50%" text-anchor="middle">UNTERGRUPPENBACH</textPath>
  </text>
</svg>
